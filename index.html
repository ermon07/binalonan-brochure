<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>MindAR Video Demo</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

/* -------------------- */
/* Start Screen */
/* -------------------- */

#start-screen{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        180deg,
        #008C95 0%,
        #45C3A7 55%,
        #9CCB3B 100%
    );

    z-index:9999;

}

.card{

    width:340px;
    max-width:90%;

    background:white;

    border-radius:20px;

    padding:35px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

.logo{

    width:90px;
    margin-bottom:15px;

}

.card h1{

    margin:0;
    color:#153C4B;
    font-size:30px;

}

.card p{

    color:#666;
    line-height:1.6;
    margin:20px 0;

}

#start-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    color:white;

    cursor:pointer;

    background:linear-gradient(
        90deg,
        #008C95,
        #45C3A7
    );

    transition:.3s;

}

#start-btn:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(0,140,149,.35);

}

#start-btn:active{

    transform:scale(.98);

}
  </style>
</head>

<body>

<div id="msg">Point your camera at the image</div>
<div id="start-screen">

    <div class="card">

        <img src="assets/logo.png" class="logo">

        <h1>Binalonan AR</h1>

        <p>
            Experience Binalonan like never before.
            Point your camera at the brochure to
            watch it come alive.
        </p>

        <button id="start-btn">
            Start AR Experience
        </button>

    </div>

</div>
<a-scene
  mindar-image="imageTargetSrc: ./assets/targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <a-assets>

    <video
      id="video"
      src="./assets/promo.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>

  </a-assets>

  <a-camera
      position="0 0 0"
      look-controls="enabled:false">
  </a-camera>

  <a-entity id="target" mindar-image-target="targetIndex:0">

    <a-video
        id="videoPlane"
        src="#video"
        width="1"
        height="0.5625"
        position="0 0 0"
        visible="false">
    </a-video>

  </a-entity>

</a-scene>

<script>

const startScreen = document.getElementById("start-screen");
const startBtn = document.getElementById("start-btn");

const video = document.getElementById("video");
const target = document.getElementById("target");
const plane = document.getElementById("videoPlane");

let started = false;

startBtn.addEventListener("click", async () => {

    // Unlock audio
    video.muted = false;

    try {
        await video.play();
        video.pause();
        video.currentTime = 0;
    } catch (e) {
        console.log(e);
    }

    startScreen.style.display = "none";
    started = true;
});

target.addEventListener("targetFound", async () => {

    if (!started) return;

    plane.setAttribute("visible", true);

    try{
        await video.play();
    }catch(e){
        console.log(e);
    }

});

target.addEventListener("targetLost", () => {

    video.pause();
    video.currentTime = 0;

    plane.setAttribute("visible", false);

});

startBtn.addEventListener("click", async () => {

    video.muted = false;

    try{
        await video.play();
        video.pause();
        video.currentTime = 0;
    }catch(e){}

    startScreen.style.opacity="0";
    startScreen.style.transition="0.6s";

    setTimeout(()=>{
        startScreen.style.display="none";
        started=true;
    },600);

});

</script>

</body>
</html>
