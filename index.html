<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>MindAR Video Demo</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #msg {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 12px 18px;
      border-radius: 10px;
      z-index: 999;
      font-family: Arial;
    }

    #start-screen{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    }

    #start-btn{
        padding:16px 28px;
        font-size:20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
    }
  </style>
</head>

<body>

<div id="msg">Point your camera at the image</div>
<div id="start-screen">
  <button id="start-btn">▶ Start AR Experience</button>
</div>
<a-scene
  mindar-image="imageTargetSrc: ./assets/targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false">

  <a-assets>

    <video
      id="video"
      src="./assets/promo.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>

  </a-assets>

  <a-camera
      position="0 0 0"
      look-controls="enabled:false">
  </a-camera>

  <a-entity id="target" mindar-image-target="targetIndex:0">

    <a-video
        id="videoPlane"
        src="#video"
        width="1"
        height="0.5625"
        position="0 0 0"
        visible="false">
    </a-video>

  </a-entity>

</a-scene>

<script>

const startScreen = document.getElementById("start-screen");
const startBtn = document.getElementById("start-btn");

const video = document.getElementById("video");
const target = document.getElementById("target");
const plane = document.getElementById("videoPlane");

let started = false;

startBtn.addEventListener("click", async () => {

    // Unlock audio
    video.muted = false;

    try {
        await video.play();
        video.pause();
        video.currentTime = 0;
    } catch (e) {
        console.log(e);
    }

    startScreen.style.display = "none";
    started = true;
});

target.addEventListener("targetFound", async () => {

    if (!started) return;

    plane.setAttribute("visible", true);

    try{
        await video.play();
    }catch(e){
        console.log(e);
    }

});

target.addEventListener("targetLost", () => {

    video.pause();
    video.currentTime = 0;

    plane.setAttribute("visible", false);

});

</script>

</body>
</html>
