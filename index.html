<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Binalonan AR</title>


<link rel="stylesheet" href="style.css">


<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>


<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>


</head>



<body>


<!-- =========================
START SCREEN
========================= -->


<div id="start-screen">


<div class="card">


<img src="assets/logo.png" class="logo">


<h1>
Binalonan AR
</h1>



<p class="subtitle">
Discover. Experience. Remember.
</p>



<p class="description">

Scan the brochure and discover
Binalonan through augmented reality.

</p>




<button id="start-btn">

▶ Start AR Experience

</button>



</div>


</div>





<!-- =========================
SCAN GUIDE
========================= -->


<div id="guide">


<div class="scan-box"></div>


<p>
Point camera at the brochure
</p>


</div>







<!-- =========================
VIDEO CONTROL PANEL
========================= -->


<div id="video-panel">


</div>

<!-- =========================
AR SCENE
========================= -->


<a-scene

mindar-image="
imageTargetSrc: assets/targets.mind;
maxTrack:4;
filterMinCF:0.001;
filterBeta:0.01;
"


color-space="sRGB"


renderer="
colorManagement:true;
"


vr-mode-ui="
enabled:false;
"


device-orientation-permission-ui="
enabled:true;
">






<a-assets>



<!-- VIDEO 0 -->

<video

id="video0"

src="assets/promo.mp4"

preload="auto"

playsinline

webkit-playsinline

crossorigin="anonymous">

</video>




<!-- VIDEO 1 -->

<video

id="video1"

src="assets/promo1.mp4"

preload="auto"

playsinline

webkit-playsinline

crossorigin="anonymous">

</video>





<!-- VIDEO 2 -->

<video

id="video2"

src="assets/promo2.mp4"

preload="auto"

playsinline

webkit-playsinline

crossorigin="anonymous">

</video>





<!-- VIDEO 3 -->

<video

id="video3"

src="assets/promo3.mp4"

preload="auto"

playsinline

webkit-playsinline

crossorigin="anonymous">

</video>



</a-assets>







<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>







<!-- =========================
TARGET 0
========================= -->


<a-entity

id="target0"

mindar-image-target="targetIndex:0">


<a-video

id="plane0"

src="#video0"

width="1"

height="0.5625"

position="0 0 0.01"

visible="false"

material="
shader:flat;
">

</a-video>


</a-entity>








<!-- =========================
TARGET 1
========================= -->


<a-entity

id="target1"

mindar-image-target="targetIndex:1">


<a-video

id="plane1"

src="#video1"

width="1"

height="0.5625"

position="0 0 0.01"

visible="false"

material="
shader:flat;
">

</a-video>


</a-entity>








<!-- =========================
TARGET 2
========================= -->


<a-entity

id="target2"

mindar-image-target="targetIndex:2">


<a-video

id="plane2"

src="#video2"

width="1"

height="0.5625"

position="0 0 0.01"

visible="false"

material="
shader:flat;
">

</a-video>


</a-entity>








<!-- =========================
TARGET 3
========================= -->


<a-entity

id="target3"

mindar-image-target="targetIndex:3">


<a-video

id="plane3"

src="#video3"

width="1"

height="0.5625"

position="0 0 0.01"

visible="false"

material="
shader:flat;
">

</a-video>


</a-entity>






</a-scene>





<script src="app.js"></script>


</body>


</html>
